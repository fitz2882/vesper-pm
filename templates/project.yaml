# .pm/project.yaml — Project Metadata
# Created by /vesper-pm-plan. Updated by PM orchestrator throughout lifecycle.

project:
  name: "{PROJECT_NAME}"
  namespace: "{PROJECT_NAMESPACE}"
  status: "discovery"  # discovery | planning | design | speccing | siloing | executing | integrating | delivered
  created: "{CREATED_DATE}"
  updated: "{CREATED_DATE}"
  brief: "{ORIGINAL_BRIEF}"
  type: ""              # web-app | cli-tool | library | data-analytics | marketing | mobile | infrastructure | general
  tech_stack: []
  has_ui: false
  figma_file_key: ""    # Populated if Figma designs exist
  estimated_effort: ""  # S | M | L | XL
  phases_completed: []
  vesper_available: false
  figma_available: false
